<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Verification</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #1c1c1c;
  padding: 25px;
  border-radius: 12px;
  width: 400px;
  border: 1px solid gold;
}

.status {
  font-weight: bold;
  margin-bottom: 15px;
}

.valid { color: #00ff99; }
.invalid { color: red; }
</style>
</head>

<body>

<div class="card">
  <h2>Gold Verification</h2>
  <div id="status" class="status">Checking...</div>
  <div id="result"></div>
</div>

<script>
const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnoZQdcx_yMEkJGSMZK0nGoC0-vr19IdpZpHZIJh9iV-FRK6ZF026aygSvhn9PwkebXhxcPB-NuE2PX/pub?gid=0&single=true&output=csv";

const params = new URLSearchParams(window.location.search);
const serial = (params.get("serial") || "").trim().toUpperCase();
const token = (params.get("token") || "").trim().toUpperCase();

const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");

function clean(value) {
  return String(value || "")
    .replace(/\uFEFF/g, "")
    .replace(/\r/g, "")
    .trim()
    .toUpperCase();
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",").map(h => clean(h));

  return lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = clean(values[i]);
    });
    return obj;
  });
}

fetch(GOOGLE_SHEET_CSV_URL)
  .then(res => res.text())
  .then(text => {
    const data = parseCSV(text);

    console.log("URL Serial:", serial);
    console.log("URL Token:", token);
    console.log("Sheet Data:", data);

    const match = data.find(r =>
      r["SERIALNUMBER"] === serial &&
      r["QRTOKEN"] === token
    );

    if (!match) {
      statusDiv.textContent = "NOT VERIFIED";
      statusDiv.className = "status invalid";
      resultDiv.innerHTML = "No matching record found.";
      return;
    }

    statusDiv.textContent = "VERIFIED";
    statusDiv.className = "status valid";

    resultDiv.innerHTML = `
      Serial: ${match.SERIALNUMBER}<br>
      Weight: ${match.WEIGHTGRAMS} g<br>
      Purity: ${match.PURITY}<br>
      Metal: ${match.METAL}<br>
      Status: ${match.STATUS}
    `;
  })
  .catch(error => {
    console.error(error);
    statusDiv.textContent = "ERROR";
    statusDiv.className = "status invalid";
    resultDiv.innerHTML = "Could not load verification database.";
  });
</script>
</body>
</html>
