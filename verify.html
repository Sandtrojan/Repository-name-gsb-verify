<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Verification</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #1c1c1c;
  padding: 25px;
  border-radius: 12px;
  width: 400px;
  border: 1px solid gold;
}

.status {
  font-weight: bold;
  margin-bottom: 15px;
}

.valid { color: #00ff99; }
.invalid { color: red; }
</style>
</head>

<body>

<div class="card">
  <h2>Gold Verification</h2>
  <div id="status" class="status">Checking...</div>
  <div id="result"></div>
</div>

<script>
const GOOGLE_SHEET_CSV_URL = "const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-.../pub?output=csv";

const params = new URLSearchParams(window.location.search);
const serial = params.get("serial");
const token = params.get("token");

const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");

function parseCSV(text) {
  const rows = text.split("\\n").map(r => r.split(","));
  const headers = rows.shift();

  return rows.map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim());
    return obj;
  });
}

fetch(GOOGLE_SHEET_CSV_URL)
  .then(res => res.text())
  .then(text => {
    const data = parseCSV(text);

    const match = data.find(r =>
      r.SerialNumber === serial && r.QRToken === token
    );

    if (!match) {
      statusDiv.textContent = "NOT VERIFIED";
      statusDiv.className = "status invalid";
      resultDiv.innerHTML = "No matching record found.";
      return;
    }

    statusDiv.textContent = "VERIFIED";
    statusDiv.className = "status valid";

    resultDiv.innerHTML = `
      Serial: ${match.SerialNumber}<br>
      Weight: ${match.WeightGrams} g<br>
      Purity: ${match.Purity}<br>
      Metal: ${match.Metal}<br>
      Status: ${match.Status}
    `;
  })
  .catch(() => {
    statusDiv.textContent = "ERROR";
  });
</script>

</body>
</html>
